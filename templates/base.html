<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NOC Utilities{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='wiki.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="NOC" class="logo">
                <span>NOC Utilities</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Главная</a>
                <a href="/admin" class="nav-link">⚙️ Админка</a>
                <a href="/api/logout" class="nav-link" style="color: #d32f2f;">Выход</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
