<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в NOC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00c853, #ff6d00);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            max-width: 120px;
            margin-bottom: 20px;
        }
        h1 {
            color: #212121;
            margin-bottom: 30px;
            font-weight: 700;
        }
        input {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #00c853;
            box-shadow: 0 0 0 3px rgba(0, 200, 83, 0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #00c853, #ff6d00);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            color: #ff1744;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="/static/logo.png" alt="NOC" class="logo">
        <h1>Доступ к NOC</h1>
        <input type="password" id="password" placeholder="Введите пароль" autocomplete="off">
        <button id="login-btn">Войти</button>
        <div class="error" id="error">Неверный пароль</div>
    </div>

    <script>
        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        function login() {
            const pwd = document.getElementById('password').value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pwd})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('password').value = '';
                }
            })
            .catch(() => {
                document.getElementById('error').style.display = 'block';
                document.getElementById('password').value = '';
            });
        }
    </script>
</body>
</html>
